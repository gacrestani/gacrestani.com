role: PhD Candidate in Evolutionary Biology
bio: |
  I'm a PhD student in the Burke Lab at Oregon State University, working on
  evolutionary genetics. My main project uses population genomics to study how
  *Drosophila melanogaster* populations adapt under decades of selection for
  postponed reproduction. I'm also drawn to information theory in biological
  systems and the evolutionary dynamics of complex systems more broadly.

